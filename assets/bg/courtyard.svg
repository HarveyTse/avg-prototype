  <ellipse cx="350" cy="540" rx="55" ry="22" fill="#6a5a40"/>
  <rect x="333" y="545" width="34" height="65" fill="#6a5a40"/>
  
  <!-- 花草 -->
  <circle cx="200" cy="510" r="12" fill="#5a8a48" opacity="0.8"/>
  <circle cx="260" cy="520" r="10" fill="#4a7a40" opacity="0.7"/>
  <circle cx="900" cy="500" r="11" fill="#5a8a48" opacity="0.8"/>
  
  <!-- 灯笼 -->
  <rect x="145" y="345" width="18" height="28" fill="#e84030" opacity="0.8" rx="2"/>
  <rect x="1050" y="355" width="18" height="28" fill="#e84030" opacity="0.8" rx="2"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a6a4a"/>
      <stop offset="50%" stop-color="#3a5a3a"/>
      <stop offset="100%" stop-color="#2a4a2a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky2)"/>
  
  <!-- 远处建筑 -->
  <rect x="50" y="250" width="200" height="200" fill="#4a3030" opacity="0.7"/>
  <rect x="950" y="280" width="200" height="170" fill="#4a3030" opacity="0.7"/>
  
  <!-- 围墙 -->
  <rect x="0" y="400" width="1200" height="20" fill="#8a6040" opacity="0.8"/>
  
  <!-- 老槐树 -->
  <rect x="560" y="160" width="80" height="290" fill="#5a4028" rx="4"/>
  <ellipse cx="600" cy="140" rx="180" ry="130" fill="#4a7a40" opacity="0.9"/>
  <ellipse cx="520" cy="160" rx="100" ry="80" fill="#4a8a45" opacity="0.8"/>
  <ellipse cx="680" cy="150" rx="110" ry="90" fill="#458a3a" opacity="0.85"/>
  
  <!-- 地面 -->
  <rect x="0" y="450" width="1200" height="350" fill="#2a2518"/>
  
  <!-- 石板路 -->
  <rect x="500" y="450" width="200" height="350" fill="#4a4030" opacity="0.7"/>
  

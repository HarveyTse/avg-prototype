<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a3a2a"/>
      <stop offset="40%" stop-color="#1a2a1a"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </linearGradient>
    <linearGradient id="treeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a2a18"/>
      <stop offset="100%" stop-color="#2a1a0a"/>
    </linearGradient>
    <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6040" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff6040" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#sky2)"/>
  
  <!-- 远处宫殿 -->
  <rect x="30" y="240" width="220" height="220" fill="#2a1a15" opacity="0.6"/>
  <polygon points="30,240 140,180 250,240" fill="#1a0a08" opacity="0.5"/>
  <rect x="950" y="270" width="220" height="180" fill="#2a1a15" opacity="0.6"/>
  <polygon points="950,270 1060,210 1170,270" fill="#1a0a08" opacity="0.5"/>
  
  <!-- 围墙 -->
  <rect x="0" y="410" width="1200" height="18" fill="#6a4a30" opacity="0.7"/>
  <rect x="0" y="428" width="1200" height="8" fill="#4a3020" opacity="0.5"/>
  
  <!-- 老槐树 -->
  <rect x="565" y="150" width="70" height="300" fill="url(#treeGrad)" rx="5"/>
  <ellipse cx="600" cy="130" rx="160" ry="120" fill="#2a5a25" opacity="0.85"/>
  <ellipse cx="530" cy="155" rx="90" ry="70" fill="#2a6528" opacity="0.8"/>
  <ellipse cx="670" cy="145" rx="100" ry="80" fill="#255a20" opacity="0.82"/>
  <ellipse cx="600" cy="100" rx="70" ry="50" fill="#306828" opacity="0.75"/>
  
  <!-- 树枝细节 -->
  <path d="M560 250 Q520 200 480 180" stroke="#3a2a15" stroke-width="6" fill="none" opacity="0.6"/>
  <path d="M640 230 Q680 180 720 160" stroke="#3a2a15" stroke-width="5" fill="none" opacity="0.6"/>
  
  <!-- 地面 -->
  <rect x="0" y="450" width="1200" height="350" fill="#1a1510"/>
  
  <!-- 石板路 -->
  <g opacity="0.25">
    <rect x="490" y="450" width="220" height="350" fill="#3a3025"/>
    <line x1="490" y1="500" x2="710" y2="500" stroke="#4a4030" stroke-width="1"/>
    <line x1="490" y1="550" x2="710" y2="550" stroke="#4a4030" stroke-width="1"/>
    <line x1="490" y1="600" x2="710" y2="600" stroke="#4a4030" stroke-width="1"/>
    <line x1="490" y1="650" x2="710" y2="650" stroke="#4a4030" stroke-width="1"/>
    <line x1="490" y1="700" x2="710" y2="700" stroke="#4a4030" stroke-width="1"/>
    <line x1="490" y1="750" x2="710" y2="750" stroke="#4a4030" stroke-width="1"/>
  </g>
  
  <!-- 石桌石凳 -->
  <ellipse cx="340" cy="540" rx="50" ry="18" fill="#5a5045"/>
  <rect x="325" y="542" width="30" height="55" fill="#4a4038"/>
  <ellipse cx="280" cy="560" rx="22" ry="10" fill="#4a4038"/>
  <ellipse cx="400" cy="560" rx="22" ry="10" fill="#4a4038"/>
  
  <!-- 花丛 -->
  <g opacity="0.8">
    <circle cx="180" cy="510" r="15" fill="#4a7040"/>
    <circle cx="210" cy="505" r="12" fill="#3a6035"/>
    <circle cx="160" cy="518" r="10" fill="#4a6838"/>
    <circle cx="920" cy="505" r="14" fill="#4a7040"/>
    <circle cx="950" cy="512" r="11" fill="#3a6035"/>
  </g>
  
  <!-- 小花点缀 -->
  <g fill="#e8c070" opacity="0.6">
    <circle cx="195" cy="500" r="3"/><circle cx="170" cy="515" r="2.5"/>
    <circle cx="935" cy="498" r="2.8"/><circle cx="910" cy="510" r="2.2"/>
  </g>
  
  <!-- 灯笼 -->
  <g filter="url(#lanternGlow)">
    <circle cx="155" cy="340" r="25" fill="#ff6040" opacity="0.15"/>
  </g>
  <rect x="145" y="340" width="20" height="32" fill="#d83828" rx="3" opacity="0.85"/>
  <rect x="148" y="336" width="14" height="5" fill="#c9a050" rx="1"/>
  <rect x="148" y="372" width="14" height="5" fill="#c9a050" rx="1"/>
  
  <g filter="url(#lanternGlow)">
    <circle cx="1055" cy="350" r="25" fill="#ff6040" opacity="0.15"/>
  </g>
  <rect x="1045" y="350" width="20" height="32" fill="#d83828" rx="3" opacity="0.85"/>
  <rect x="1048" y="346" width="14" height="5" fill="#c9a050" rx="1"/>
  <rect x="1048" y="382" width="14" height="5" fill="#c9a050" rx="1"/>
</svg>

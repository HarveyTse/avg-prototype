<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="gSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a4a3a"/>
      <stop offset="50%" stop-color="#1a3a2a"/>
      <stop offset="100%" stop-color="#0a2a1a"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3545"/>
      <stop offset="100%" stop-color="#0a2535"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#gSky)"/>
  
  <!-- 假山群 -->
  <path d="M60 490 Q100 380 160 410 Q200 320 260 370 Q300 290 350 340 Q380 310 410 420 L60 490Z" fill="#4a4a45" opacity="0.85"/>
  <path d="M80 475 Q120 400 170 420 Q210 350 260 385 Q290 330 340 365 L80 475Z" fill="#3a5a3a" opacity="0.6"/>
  <path d="M350 480 Q380 420 420 440 Q450 380 480 410 Q500 370 520 430 L350 480Z" fill="#4a4a45" opacity="0.75"/>
  
  <!-- 柳树 -->
  <rect x="820" y="190" width="18" height="260" fill="#4a3520"/>
  <ellipse cx="829" cy="170" rx="120" ry="100" fill="#3a7a40" opacity="0.85"/>
  
  <!-- 柳枝 -->
  <g stroke="#4a8a48" stroke-width="2" fill="none" opacity="0.65">
    <path d="M760 240 Q770 310 785 380"/>
    <path d="M790 230 Q795 300 805 370"/>
    <path d="M820 220 Q822 290 828 360"/>
    <path d="M850 230 Q852 300 858 370"/>
    <path d="M880 240 Q878 310 872 380"/>
  </g>
  
  <!-- 花丛 -->
  <g opacity="0.85">
    <circle cx="480" cy="485" r="28" fill="#7a3848"/>
    <circle cx="530" cy="492" r="22" fill="#8a4055"/>
    <circle cx="440" cy="495" r="18" fill="#7a3a45"/>
    <circle cx="560" cy="488" r="15" fill="#8a4550"/>
    <circle cx="720" cy="478" r="22" fill="#4a7a45"/>
    <circle cx="760" cy="485" r="18" fill="#3a6a38"/>
  </g>
  
  <!-- 小花点缀 -->
  <g fill="#e8c070" opacity="0.65">
    <circle cx="495" cy="475" r="4"/><circle cx="520" cy="470" r="3"/>
    <circle cx="465" cy="480" r="3.5"/><circle cx="545" cy="478" r="2.8"/>
    <circle cx="735" cy="468" r="3.2"/><circle cx="750" cy="475" r="2.5"/>
  </g>
  
  <!-- 水池 -->
  <ellipse cx="600" cy="585" rx="240" ry="95" fill="url(#waterGrad)" opacity="0.7"/>
  <ellipse cx="600" cy="585" rx="220" ry="85" fill="#1a3a4a" opacity="0.5"/>
  
  <!-- 水面波纹 -->
  <ellipse cx="550" cy="570" rx="60" ry="15" fill="#2a5060" opacity="0.25"/>
  <ellipse cx="650" cy="595" rx="50" ry="12" fill="#2a5060" opacity="0.2"/>
  
  <!-- 荷叶 -->
  <ellipse cx="520" cy="575" rx="28" ry="14" fill="#2a5a30" opacity="0.5"/>
  <ellipse cx="680" cy="580" rx="24" ry="12" fill="#2a5a30" opacity="0.45"/>
  
  <!-- 地面 -->
  <rect x="0" y="540" width="1200" height="260" fill="#1a1510" opacity="0.85"/>
  
  <!-- 蝴蝶 -->
  <g fill="#e8c070" opacity="0.6">
    <path d="M520 330 Q530 318 536 324 Q530 330 520 330Z"/>
    <path d="M520 330 Q510 318 504 324 Q510 330 520 330Z"/>
  </g>

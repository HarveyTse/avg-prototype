<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="hallBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a2010"/>
      <stop offset="100%" stop-color="#1a0a05"/>
    </linearGradient>
    <linearGradient id="pillarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a83010"/>
      <stop offset="50%" stop-color="#c84018"/>
      <stop offset="100%" stop-color="#a83010"/>
    </linearGradient>
    <radialGradient id="hallLight" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#e8c070" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e8c070" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#hallBg)"/>
  <rect width="1200" height="800" fill="url(#hallLight)"/>
  
  <!-- 大殿柱子 -->
  <rect x="85" y="60" width="40" height="540" fill="url(#pillarGrad)"/>
  <rect x="1075" y="60" width="40" height="540" fill="url(#pillarGrad)"/>
  <rect x="280" y="60" width="35" height="540" fill="url(#pillarGrad)" opacity="0.7"/>
  <rect x="885" y="60" width="35" height="540" fill="url(#pillarGrad)" opacity="0.7"/>
  
  <!-- 柱头金饰 -->
  <rect x="80" y="52" width="50" height="14" fill="#d4a850" opacity="0.75"/>
  <rect x="1070" y="52" width="50" height="14" fill="#d4a850" opacity="0.75"/>
  <rect x="275" y="52" width="45" height="12" fill="#d4a850" opacity="0.6"/>
  <rect x="880" y="52" width="45" height="12" fill="#d4a850" opacity="0.6"/>
  
  <!-- 柱础 -->
  <rect x="80" y="595" width="50" height="10" fill="#3a2a18" rx="2"/>
  <rect x="1070" y="595" width="50" height="10" fill="#3a2a18" rx="2"/>
  
  <!-- 地面金砖 -->
  <rect x="0" y="600" width="1200" height="200" fill="#3a2a18"/>
  <g opacity="0.2">
    <line x1="0" y1="640" x2="1200" y2="640" stroke="#d4a850"/>
    <line x1="0" y1="680" x2="1200" y2="680" stroke="#d4a850"/>
    <line x1="0" y1="720" x2="1200" y2="720" stroke="#d4a850"/>
    <line x1="0" y1="760" x2="1200" y2="760" stroke="#d4a850"/>
    <line x1="150" y1="600" x2="150" y2="800" stroke="#d4a850"/>
    <line x1="300" y1="600" x2="300" y2="800" stroke="#d4a850"/>
    <line x1="450" y1="600" x2="450" y2="800" stroke="#d4a850"/>
    <line x1="600" y1="600" x2="600" y2="800" stroke="#d4a850"/>
    <line x1="750" y1="600" x2="750" y2="800" stroke="#d4a850"/>
    <line x1="900" y1="600" x2="900" y2="800" stroke="#d4a850"/>
    <line x1="1050" y1="600" x2="1050" y2="800" stroke="#d4a850"/>
  </g>
  
  <!-- 龙椅台 -->
  <rect x="440" y="430" width="320" height="40" fill="#4a3a20"/>
  <rect x="460" y="400" width="280" height="35" fill="#5a4a28"/>
  <rect x="480" y="375" width="240" height="30" fill="#6a5a30"/>
  
  <!-- 金线装饰 -->
  <line x1="440" y1="430" x2="760" y2="430" stroke="#d4a850" stroke-width="1" opacity="0.4"/>
  <line x1="460" y1="400" x2="740" y2="400" stroke="#d4a850" stroke-width="1" opacity="0.3"/>
  
  <!-- 光晕效果 -->
  <circle cx="600" cy="350" r="180" fill="#e8c070" opacity="0.04"/>
  <circle cx="600" cy="350" r="90" fill="#e8c070" opacity="0.06"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="nightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a20"/>
      <stop offset="50%" stop-color="#151530"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c070" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e8c070" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#nightSky)"/>
  
  <!-- 星星 -->
  <circle cx="100" cy="80" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="250" cy="120" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="400" cy="60" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="550" cy="100" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="700" cy="50" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="850" cy="90" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="1000" cy="70" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="1100" cy="110" r="1.5" fill="#fff" opacity="0.5"/>
  
  <!-- 月亮 -->
  <circle cx="900" cy="150" r="150" fill="url(#moonGlow)"/>
  <circle cx="900" cy="150" r="40" fill="#fff8dc" opacity="0.8"/>
  
  <!-- 远处建筑剪影 -->
  <path d="M0 500 L0 400 L100 400 L100 350 L150 350 L150 400 L300 400 L300 450 L500 450 L500 380 L550 380 L550 450 L700 450 L700 420 L750 420 L750 450 L900 450 L900 380 L950 380 L950 450 L1100 450 L1100 400 L1200 400 L1200 500Z" fill="#151020"/>
  
  <!-- 地面 -->
  <rect x="0" y="500" width="1200" height="300" fill="#0a0810"/>
  
  <!-- 窗户灯光 -->
  <rect x="120" y="420" width="18" height="25" fill="#e8c070" opacity="0.35"/>
  <rect x="520" y="400" width="18" height="25" fill="#e8c070" opacity="0.3"/>
  <rect x="920" y="410" width="18" height="25" fill="#e8c070" opacity="0.35"/>
</svg>

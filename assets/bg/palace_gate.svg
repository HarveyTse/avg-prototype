<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a2a6e"/>
      <stop offset="40%" stop-color="#6a4080"/>
      <stop offset="70%" stop-color="#8a5060"/>
      <stop offset="100%" stop-color="#5a3040"/>
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d44020"/>
      <stop offset="100%" stop-color="#a83010"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky)"/>
  
  <!-- 云彩 -->
  <ellipse cx="200" cy="120" rx="150" ry="40" fill="#8a6090" opacity="0.4"/>
  <ellipse cx="800" cy="100" rx="120" ry="35" fill="#7a5080" opacity="0.35"/>
  
  <!-- 月亮 -->
  <circle cx="950" cy="150" r="100" fill="#c9a96e" opacity="0.2"/>
  <circle cx="950" cy="150" r="45" fill="#fff8dc" opacity="0.8"/>
  
  <!-- 远山 -->
  <path d="M0 420 Q200 360 400 400 Q600 340 800 380 Q1000 330 1200 370 L1200 500 L0 500Z" fill="#3a2a50" opacity="0.7"/>
  
  <!-- 城墙 -->
  <rect x="0" y="480" width="1200" height="320" fill="#2a1515"/>
  
  <!-- 宫门主体 -->
  <rect x="350" y="200" width="500" height="330" fill="url(#wall)" rx="4"/>
  <rect x="350" y="190" width="500" height="20" fill="#e8c070" opacity="0.7"/>
  
  <!-- 屋顶 -->
  <polygon points="300,200 600,100 900,200" fill="#5a2010"/>
  <polygon points="320,200 600,115 880,200" fill="#4a1808"/>
  
  <!-- 飞檐 -->
  <path d="M300,200 Q270,185 250,195" stroke="#e8c070" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M900,200 Q930,185 950,195" stroke="#e8c070" stroke-width="2.5" fill="none" opacity="0.7"/>
  
  <!-- 大门 -->
  <rect x="500" y="320" width="200" height="210" fill="#2a1008" rx="4"/>
  <circle cx="560" cy="430" r="14" fill="#e8c070" opacity="0.9"/>
  <circle cx="640" cy="430" r="14" fill="#e8c070" opacity="0.9"/>
  
  <!-- 石狮 -->
  <ellipse cx="440" cy="510" rx="35" ry="45" fill="#6a5a50" opacity="0.9"/>
  <ellipse cx="760" cy="510" rx="35" ry="45" fill="#6a5a50" opacity="0.9"/>
  
  <!-- 灯笼 -->
  <rect x="375" y="245" width="22" height="35" fill="#e84030" opacity="0.9" rx="3"/>
  <rect x="803" y="245" width="22" height="35" fill="#e84030" opacity="0.9" rx="3"/>
  <circle cx="386" cy="235" r="10" fill="#ff8060" opacity="0.6"/>
  <circle cx="814" cy="235" r="10" fill="#ff8060" opacity="0.6"/>
  
  <!-- 地面 -->
  <rect x="0" y="550" width="1200" height="250" fill="#2a1818"/>
  
  <!-- 落叶 -->
  <circle cx="200" cy="350" r="3" fill="#e8c070" opacity="0.7"/>
  <circle cx="450" cy="280" r="2.5" fill="#e8c070" opacity="0.6"/>
  <circle cx="750" cy="320" r="3" fill="#e8c070" opacity="0.6"/>
  <circle cx="1050" cy="300" r="2.5" fill="#e8c070" opacity="0.5"/>
</svg>

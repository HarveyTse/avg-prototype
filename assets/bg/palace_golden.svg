<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="goldSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a3a10"/>
      <stop offset="40%" stop-color="#6a4a20"/>
      <stop offset="100%" stop-color="#3a2510"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#e8c070" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e8c070" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#goldSky)"/>
  <rect width="1200" height="800" fill="url(#sunGlow)"/>
  
  <!-- 远处宫殿 -->
  <rect x="300" y="200" width="600" height="250" fill="#5a3018" opacity="0.8"/>
  <polygon points="280,200 600,100 920,200" fill="#6a4025" opacity="0.7"/>
  
  <!-- 主殿 -->
  <rect x="400" y="250" width="400" height="200" fill="#7a4525" opacity="0.9"/>
  <polygon points="380,250 600,160 820,250" fill="#8a5530"/>
  
  <!-- 金色装饰 -->
  <rect x="400" y="245" width="400" height="8" fill="#e8c070" opacity="0.7"/>
  <circle cx="600" cy="200" r="25" fill="#e8c070" opacity="0.5"/>
  
  <!-- 台阶 -->
  <rect x="350" y="450" width="500" height="20" fill="#6a4520"/>
  <rect x="330" y="470" width="540" height="20" fill="#5a3a18"/>
  <rect x="310" y="490" width="580" height="20" fill="#4a3010"/>
  
  <!-- 地面 -->
  <rect x="0" y="550" width="1200" height="250" fill="#3a2010"/>
  
  <!-- 金色光斑 -->
  <circle cx="400" cy="300" r="4" fill="#e8c070" opacity="0.6"/>
  <circle cx="600" cy="280" r="5" fill="#e8c070" opacity="0.7"/>
  <circle cx="800" cy="300" r="4" fill="#e8c070" opacity="0.6"/>
</svg>

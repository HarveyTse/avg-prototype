<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="pnSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a25"/>
      <stop offset="60%" stop-color="#151535"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#pnSky)"/>
  
  <!-- 星星 -->
  <circle cx="150" cy="60" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="350" cy="90" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="550" cy="40" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="750" cy="80" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="950" cy="50" r="1.5" fill="#fff" opacity="0.7"/>
  
  <!-- 月亮 -->
  <circle cx="200" cy="120" r="80" fill="#e8c070" opacity="0.12"/>
  <circle cx="200" cy="120" r="35" fill="#fff8dc" opacity="0.6"/>
  
  <!-- 宫殿剪影 -->
  <rect x="200" y="300" width="800" height="250" fill="#151020" opacity="0.9"/>
  <polygon points="180,300 600,180 1020,300" fill="#151020"/>
  
  <!-- 窗户灯光 -->
  <rect x="300" y="380" width="22" height="32" fill="#e8c070" opacity="0.3"/>
  <rect x="400" y="380" width="22" height="32" fill="#e8c070" opacity="0.25"/>
  <rect x="500" y="380" width="22" height="32" fill="#e8c070" opacity="0.35"/>
  <rect x="600" y="380" width="22" height="32" fill="#e8c070" opacity="0.2"/>
  <rect x="700" y="380" width="22" height="32" fill="#e8c070" opacity="0.3"/>
  <rect x="800" y="380" width="22" height="32" fill="#e8c070" opacity="0.25"/>
  
  <!-- 地面 -->
  <rect x="0" y="550" width="1200" height="250" fill="#080810"/>
  
  <!-- 月光倒影 -->
  <ellipse cx="600" cy="650" rx="300" ry="40" fill="#e8c070" opacity="0.05"/>
</svg>

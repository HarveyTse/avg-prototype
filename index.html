<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>凤鸣九霄 - 互动剧情</title>
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <div id="game-root">
    <!-- 背景层 -->
    <div id="bg-layer">
      <div id="bg-current" class="bg-image"></div>
      <div id="bg-next" class="bg-image"></div>
      <div id="bg-overlay"></div>
    </div>

    <!-- 角色层 -->
    <div id="char-layer"></div>

    <!-- UI 层 -->
    <div id="ui-layer">
      <!-- 顶部状态栏 -->
      <div id="top-bar">
        <div id="game-title">凤鸣九霄</div>
        <div id="top-buttons">
          <button id="btn-auto" class="top-btn" title="自动播放">Auto</button>
          <button id="btn-skip" class="top-btn" title="快进">Skip</button>
          <button id="btn-menu" class="top-btn" title="菜单">Menu</button>
        </div>
      </div>

      <!-- 变量显示条 -->
      <div id="status-bar">
        <div class="stat"><span class="stat-label">恩宠</span><span class="stat-value" id="stat-favor">0</span></div>
        <div class="stat"><span class="stat-label">勇气</span><span class="stat-value" id="stat-courage">0</span></div>
        <div class="stat"><span class="stat-label">智慧</span><span class="stat-value" id="stat-wisdom">0</span></div>
        <div class="stat"><span class="stat-label">魅力</span><span class="stat-value" id="stat-charm">0</span></div>
      </div>

      <!-- 选项面板 -->
      <div id="option-panel" class="hidden">
        <div id="option-list"></div>
      </div>

      <!-- 对话框 -->
      <div id="dialog-box" class="hidden">
        <div id="speaker-name"></div>
        <div id="dialog-text"></div>
        <div id="dialog-indicator">▼</div>
      </div>

      <!-- 全屏文字（旁白等） -->
      <div id="narration-box" class="hidden">
        <div id="narration-text"></div>
        <div id="narration-indicator">▼</div>
      </div>
    </div>

    <!-- 菜单覆盖层 -->
    <div id="menu-overlay" class="hidden">
      <div id="menu-panel">
        <h2>菜 单</h2>
        <button class="menu-btn" id="menu-save">存 档</button>
        <button class="menu-btn" id="menu-load">读 档</button>
        <button class="menu-btn" id="menu-settings">设 置</button>
        <button class="menu-btn" id="menu-title">返回标题</button>
        <button class="menu-btn menu-close" id="menu-close">返 回</button>
      </div>
    </div>

    <!-- 存档面板 -->
    <div id="save-overlay" class="hidden">
      <div id="save-panel">
        <h2 id="save-panel-title">存 档</h2>
        <div id="save-slots"></div>
        <button class="menu-btn menu-close" id="save-close">返 回</button>
      </div>
    </div>

    <!-- 设置面板 -->
    <div id="settings-overlay" class="hidden">
      <div id="settings-panel">
        <h2>设 置</h2>
        <div class="setting-row">
          <span>文字速度</span>
          <input type="range" id="setting-text-speed" min="1" max="10" value="5">
        </div>
        <div class="setting-row">
          <span>自动播放速度</span>
          <input type="range" id="setting-auto-speed" min="1" max="10" value="5">
        </div>
        <div class="setting-row">
          <span>背景音乐</span>
          <input type="range" id="setting-bgm" min="0" max="10" value="7">
        </div>
        <div class="setting-row">
          <span>音效</span>
          <input type="range" id="setting-sfx" min="0" max="10" value="7">
        </div>
        <button class="menu-btn menu-close" id="settings-close">返 回</button>
      </div>
    </div>

    <!-- 标题画面 -->
    <div id="title-screen">
      <div id="title-bg"></div>
      <div id="title-content">
        <h1 id="title-name">凤鸣九霄</h1>
        <p id="title-subtitle">一入宫门深似海</p>
        <div id="title-buttons">
          <button class="title-btn" id="btn-new-game">开始游戏</button>
          <button class="title-btn" id="btn-continue">继续游戏</button>
          <button class="title-btn" id="btn-about">关于</button>
        </div>
      </div>
      <div id="title-footer">互动剧情原型 · 学习参考</div>
    </div>

    <!-- 过渡效果层 -->
    <div id="transition-layer" class="hidden"></div>
  </div>

  <script src="js/variables.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/engine.js"></script>
  <script src="data/story.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
